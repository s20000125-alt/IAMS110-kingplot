<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>King Plot Tool</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Plotly -->
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --shadow:0 10px 30px rgba(0,0,0,.06);
      --radius:14px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      color:var(--text);
      background:var(--bg);
    }
    .wrap{
      max-width:1100px;
      margin:28px auto;
      padding:0 16px;
    }
    .title{
      display:flex;
      align-items:baseline;
      gap:12px;
      margin:0 0 14px 0;
    }
    .title h1{
      font-size:22px;
      margin:0;
      font-weight:700;
      letter-spacing:-0.02em;
    }
    .title .sub{
      color:var(--muted);
      font-size:13px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin:12px 0;
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:end;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:160px;
    }
    label{
      font-size:12px;
      color:var(--muted);
    }
    select, button{
      height:38px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 10px;
      font-size:14px;
      outline:none;
    }
    select:focus{
      border-color:#c7d2fe;
      box-shadow:0 0 0 4px rgba(99,102,241,.15);
    }
    button{
      cursor:pointer;
      font-weight:600;
      border:none;
      background:#111827;
      color:#fff;
      padding:0 14px;
    }
    button:hover{ opacity:.92; }

    .grid2{
      display:grid;
      grid-template-columns: 1.6fr 1fr;
      gap:12px;
    }
    @media (max-width: 980px){
      .grid2{ grid-template-columns: 1fr; }
      .field{ min-width: 140px; }
    }

    #plot{ width:100%; height:560px; }

    .fitline{
      font-size:13px;
      line-height:1.55;
    }
    .fitline b{ font-weight:700; }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:12px;
      background:#0b1020;
      color:#e5e7eb;
      border-radius:12px;
      padding:12px;
      overflow:auto;
      white-space:pre;
      margin:0;
    }

    .zoomsTitle{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
      margin:0 0 8px 0;
    }
    .zoomsTitle h2{
      font-size:16px;
      margin:0;
      font-weight:700;
    }
    .hint{
      font-size:12px;
      color:var(--muted);
    }
    #zooms{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:12px;
    }
    @media (max-width: 980px){
      #zooms{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px){
      #zooms{ grid-template-columns: 1fr; }
    }
    .zoomBox{
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
      background:#fff;
    }
    .zoomInner{
      width:100%;
      height:240px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="title">
      <h1>King Plot Tool</h1>
      <div class="sub">Transition selector • linear fit • d⊥ • zoom panels</div>
    </div>

    <!-- Controls -->
    <div class="card">
      <div class="controls">
        <div class="field">
          <label for="tx">Transition X</label>
          <select id="tx">
            <option>680</option>
            <option>770</option>
            <option>431</option>
            <option>578</option>
            <option>1798</option>
            <option>467</option>
            <option>411</option>
          </select>
        </div>

        <div class="field">
          <label for="ty">Transition Y</label>
          <select id="ty">
            <option>770</option>
            <option>680</option>
            <option>431</option>
            <option>578</option>
            <option>1798</option>
            <option>467</option>
            <option>411</option>
          </select>
        </div>

        <div class="field">
          <label for="ref">Reference isotope</label>
          <select id="ref">
            <option>170</option>
            <option>171</option>
            <option>172</option>
            <option>173</option>
            <option selected>174</option>
            <option>176</option>
          </select>
        </div>

        <button id="btn">Plot</button>
      </div>
    </div>

    <!-- Main plot -->
    <div class="card">
      <div id="plot"></div>
    </div>

    <!-- Fit + table -->
    <div class="grid2">
      <div class="card">
        <div id="fit" class="fitline"></div>
      </div>
      <div class="card">
        <div class="hint">Table includes perpendicular distance d⊥</div>
        <pre id="out" class="mono"></pre>
      </div>
    </div>

    <!-- Zooms -->
    <div class="card">
      <div class="zoomsTitle">
        <h2>Zoom isotope pairs</h2>
        <div class="hint">Each panel shows projection to fit line and d⊥</div>
      </div>
      <div id="zooms"></div>
    </div>
  </div>

<script>
const ISOTOPES = [170,171,172,173,174,176];

const MASS = {
  170:169.9347664,
  171:170.9363302,
  172:171.9363859,
  173:172.9382151,
  174:173.9388664,
  176:175.9425717
};

function mu(mA, mref){
  return (mA*mref)/Math.abs(mA-mref);
}

async function loadTransition(tr){
  const r = await fetch("data/"+tr+".json");
  if(!r.ok) throw new Error("Cannot load data/"+tr+".json (HTTP "+r.status+")");
  const j = await r.json();

  const map = new Map();
  for(const d of j.data){
    map.set(Number(d.isotope), Number(d.average));
  }
  return map;
}

function linearFit(x, y){
  // OLS: y = a + b x
  const n = x.length;
  let sx=0, sy=0, sxx=0, sxy=0;
  for(let i=0;i<n;i++){
    sx+=x[i]; sy+=y[i];
    sxx+=x[i]*x[i]; sxy+=x[i]*y[i];
  }
  const denom = n*sxx - sx*sx;
  const b = (n*sxy - sx*sy)/denom;
  const a = (sy - b*sx)/n;

  // R^2
  const ybar = sy/n;
  let ss_res=0, ss_tot=0;
  for(let i=0;i<n;i++){
    const yh = a + b*x[i];
    ss_res += (y[i]-yh)*(y[i]-yh);
    ss_tot += (y[i]-ybar)*(y[i]-ybar);
  }
  const r2 = 1 - ss_res/ss_tot;

  return {a,b,r2};
}

function dPerp(a,b,x0,y0){
  // distance to line y = a + b x -> b x - y + a = 0
  return Math.abs(b*x0 - y0 + a)/Math.sqrt(b*b + 1);
}

function projPoint(a,b,x0,y0){
  const x_proj = (x0 + b*(y0 - a))/(1 + b*b);
  const y_proj = a + b*x_proj;
  return {x_proj, y_proj};
}

function linspace(x1,x2,n=120){
  if(n<=1) return [x1];
  const out=[];
  const step=(x2-x1)/(n-1);
  for(let i=0;i<n;i++) out.push(x1 + step*i);
  return out;
}

async function plot(){
  try{
    const tx = document.getElementById("tx").value;
    const ty = document.getElementById("ty").value;
    const ref = Number(document.getElementById("ref").value);

    if(tx === ty){
      alert("X and Y must be different");
      return;
    }

    const dx = await loadTransition(tx);
    const dy = await loadTransition(ty);

    if(!dx.has(ref) || !dy.has(ref)){
      alert("REF="+ref+" not found in one of the transitions");
      return;
    }

    const nu_x_ref = dx.get(ref);
    const nu_y_ref = dy.get(ref);
    const mref = MASS[ref];

    const pts=[];
    for(const A of ISOTOPES){
      if(A===ref) continue;
      if(!dx.has(A) || !dy.has(A)) continue;

      const dnu_x = dx.get(A) - nu_x_ref;
      const dnu_y = dy.get(A) - nu_y_ref;

      const muA = mu(MASS[A], mref);
      const mIS_x = muA*dnu_x;
      const mIS_y = muA*dnu_y;

      pts.push({A, mIS_x, mIS_y});
    }

    if(pts.length < 2){
      alert("Not enough points to fit.");
      return;
    }

    const x = pts.map(p=>p.mIS_x);
    const y = pts.map(p=>p.mIS_y);

    const {a,b,r2} = linearFit(x,y);

    // main fit line
    const xmin = Math.min(...x), xmax = Math.max(...x);
    const xr = (xmax-xmin) || 1;
    const xx = linspace(xmin-0.05*xr, xmax+0.05*xr, 300);
    const yy = xx.map(t => a + b*t);

    Plotly.newPlot("plot",[
      {
        x, y,
        mode:"markers+text",
        text: pts.map(p=>String(p.A)),
        textposition:"top right",
        type:"scatter",
        name:"Isotopes"
      },
      {
        x:xx, y:yy,
        mode:"lines",
        type:"scatter",
        name:"Linear fit"
      }
    ],{
      title:`King Plot: ${ty} vs ${tx} (ref=${ref})`,
      xaxis:{title:`μΔν (${tx})`},
      yaxis:{title:`μΔν (${ty})`},
      margin:{l:70,r:20,t:60,b:60}
    }, {responsive:true});

    // fit summary
    document.getElementById("fit").innerHTML =
      `<b>Fit:</b> mIS<sub>${ty}</sub> = a + b·mIS<sub>${tx}</sub>`+
      ` &nbsp; | &nbsp; <b>a</b> = ${a.toPrecision(6)}`+
      ` &nbsp; <b>b</b> = ${b.toPrecision(6)}`+
      ` &nbsp; <b>R²</b> = ${r2.toPrecision(6)}`;

    // distance table
    let out = "A\tmIS_x\tmIS_y\td_perp\n";
    const denom = Math.sqrt(b*b + 1);
    for(const p of pts){
      const d = Math.abs(b*p.mIS_x - p.mIS_y + a)/denom;
      out += `${p.A}\t${p.mIS_x}\t${p.mIS_y}\t${d}\n`;
    }
    document.getElementById("out").textContent = out;

    // zoom isotope pairs (use CSS grid + fixed inner div)
    const zooms = document.getElementById("zooms");
    zooms.innerHTML = "";

    const y_min = Math.min(...y), y_max = Math.max(...y);
    const yspan = (y_max - y_min) || 1;
    const xspan = (xmax - xmin) || 1;
    const pad_frac = 0.06;
    const hx = pad_frac*xspan;
    const hy = pad_frac*yspan;

    for(const p of pts){
      const x0 = p.mIS_x, y0 = p.mIS_y;

      const box = document.createElement("div");
      box.className = "zoomBox";
      const inner = document.createElement("div");
      inner.className = "zoomInner";
      box.appendChild(inner);
      zooms.appendChild(box);

      const pr = projPoint(a,b,x0,y0);
      const d = dPerp(a,b,x0,y0);

      const zxx = linspace(x0-hx, x0+hx, 80);
      const zyy = zxx.map(t => a + b*t);

      Plotly.newPlot(inner,[
        {x:zxx, y:zyy, mode:"lines", type:"scatter", showlegend:false},
        {x:[x0], y:[y0], mode:"markers", type:"scatter", showlegend:false},
        {x:[x0, pr.x_proj], y:[y0, pr.y_proj], mode:"lines", type:"scatter", showlegend:false}
      ],{
        title:`${p.A}–${ref}   d⊥=${d.toPrecision(4)}`,
        margin:{l:40,r:10,t:40,b:35},
        xaxis:{range:[x0-hx, x0+hx]},
        yaxis:{range:[y0-hy, y0+hy]}
      },{displayModeBar:false, responsive:true});
    }

  }catch(err){
    alert(String(err));
    console.error(err);
  }
}

// wire button + initial plot
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("btn").addEventListener("click", plot);
  plot();
});
</script>

</body>
</html>
