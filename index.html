<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>King Plot Tool</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --shadow:0 10px 30px rgba(0,0,0,.06);
      --radius:14px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      color:var(--text);
      background:var(--bg);
    }
    .wrap{ max-width:1100px; margin:28px auto; padding:0 16px; }
    .title{ display:flex; align-items:baseline; gap:12px; margin:0 0 14px 0; }
    .title h1{ font-size:22px; margin:0; font-weight:700; letter-spacing:-0.02em; }
    .title .sub{ color:var(--muted); font-size:13px; }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin:12px 0;
    }

    .controls{ display:flex; flex-wrap:wrap; gap:12px; align-items:end; }
    .field{ display:flex; flex-direction:column; gap:6px; min-width:160px; }
    label{ font-size:12px; color:var(--muted); }
    select, button{
      height:38px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 10px;
      font-size:14px;
      outline:none;
    }
    select:focus{ border-color:#c7d2fe; box-shadow:0 0 0 4px rgba(99,102,241,.15); }
    button{
      cursor:pointer;
      font-weight:600;
      border:none;
      background:#111827;
      color:#fff;
      padding:0 14px;
    }
    button:hover{ opacity:.92; }

    .grid2{
      display:grid;
      grid-template-columns: 1.6fr 1fr;
      gap:12px;
    }
    @media (max-width: 980px){
      .grid2{ grid-template-columns: 1fr; }
      .field{ min-width:140px; }
    }

    #plot{
      width:100%;
      height:560px;
      position:relative;
      overflow:visible;
      z-index:1;
    }
    #plot .main-svg, 
    #plot .svg-container, 
    #plot .plot-container,
    #plot .draglayer,
    #plot .nsewdrag,
    #plot .hoverlayer,
    #plot .modebar{
      pointer-events: all !important;
    }
    #plot .modebar{
      opacity:1 !important;
    }

    .coordBox{
      position:absolute;
      top:12px;
      right:12px;
      z-index:30;
      background:rgba(17,24,39,.92);
      color:#fff;
      padding:8px 10px;
      border-radius:10px;
      font-size:12px;
      line-height:1.45;
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      pointer-events:none;
      box-shadow:0 6px 18px rgba(0,0,0,.18);
      min-width:160px;
    }
    .coordBox .label{
      color:#cbd5e1;
      margin-right:6px;
    }

    .fitline{ font-size:13px; line-height:1.55; }
    .fitline b{ font-weight:700; }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:12px;
      background:#0b1020;
      color:#e5e7eb;
      border-radius:12px;
      padding:12px;
      overflow:auto;
      white-space:pre;
      margin:0;
      line-height: 1.45;
    }

    .zoomsTitle{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin:0 0 8px 0; }
    .zoomsTitle h2{ font-size:16px; margin:0; font-weight:700; }
    .hint{ font-size:12px; color:var(--muted); }

    #zooms{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:12px;
    }
    @media (max-width: 980px){ #zooms{ grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 640px){ #zooms{ grid-template-columns: 1fr; } }

    .zoomBox{ border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#fff; }
    .zoomInner{ width:100%; height:240px; position:relative; z-index:1; }
    .zoomInner .modebar{ opacity:1 !important; }
    .zoomInner .main-svg, .zoomInner .draglayer, .zoomInner .modebar{ pointer-events:all !important; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="title">
      <h1>King Plot Tool</h1>
      <div class="sub">linear fit • R² • d⊥ • zoom panels</div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="field">
          <label for="tx">Transition X</label>
          <select id="tx">
            <option>680</option><option>770</option><option>431</option><option>578</option>
            <option>1798</option><option>467</option><option>411</option>
          </select>
        </div>

        <div class="field">
          <label for="ty">Transition Y</label>
          <select id="ty">
            <option>770</option><option>680</option><option>431</option><option>578</option>
            <option>1798</option><option>467</option><option>411</option>
          </select>
        </div>

        <div class="field">
          <label for="ref">Reference isotope</label>
          <select id="ref">
            <option>170</option><option>171</option><option>172</option>
            <option>173</option><option selected>174</option><option>176</option>
          </select>
        </div>

        <button id="btn">Plot</button>
      </div>
    </div>

    <div class="card">
      <div id="plot">
        <div id="coordBox" class="coordBox">
          <div><span class="label">x</span><span id="coordX">–</span></div>
          <div><span class="label">y</span><span id="coordY">–</span></div>
        </div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div id="fit" class="fitline"></div>
      </div>
      <div class="card">
        <pre id="out" class="mono"></pre>
      </div>
    </div>

    <div class="card">
      <div class="zoomsTitle">
        <h2>Zoom isotope pairs</h2>
        <div class="hint">Hover shows: Isotope point / Linear fit</div>
      </div>
      <div id="zooms"></div>
    </div>
  </div>

<script>
const ISOTOPES = [170,171,172,173,174,176];
const MASS = {
  170:169.9347664, 171:170.9363302, 172:171.9363859,
  173:172.9382151, 174:173.9388664, 176:175.9425717
};

function mu(mA, mref){ return (mA*mref)/Math.abs(mA-mref); }

async function loadTransition(tr){
  const r = await fetch("data/"+tr+".json");
  if(!r.ok) throw new Error("Cannot load data/"+tr+".json (HTTP "+r.status+")");
  const j = await r.json();
  const map = new Map();
  for(const d of j.data) map.set(Number(d.isotope), Number(d.average));
  return map;
}

function linearFit(x, y){
  const n = x.length;
  let sx=0, sy=0, sxx=0, sxy=0;
  for(let i=0;i<n;i++){ sx+=x[i]; sy+=y[i]; sxx+=x[i]*x[i]; sxy+=x[i]*y[i]; }
  const denom = n*sxx - sx*sx;
  const b = (n*sxy - sx*sy)/denom;
  const a = (sy - b*sx)/n;

  const ybar = sy/n;
  let ss_res=0, ss_tot=0;
  for(let i=0;i<n;i++){
    const yh = a + b*x[i];
    ss_res += (y[i]-yh)*(y[i]-yh);
    ss_tot += (y[i]-ybar)*(y[i]-ybar);
  }
  const r2 = 1 - ss_res/ss_tot;
  return {a,b,r2};
}

function dPerp(a,b,x0,y0){
  return Math.abs(b*x0 - y0 + a)/Math.sqrt(b*b + 1);
}
function projPoint(a,b,x0,y0){
  const x_proj = (x0 + b*(y0 - a))/(1 + b*b);
  const y_proj = a + b*x_proj;
  return {x_proj,y_proj};
}
function linspace(x1,x2,n=120){
  if(n<=1) return [x1];
  const out=[], step=(x2-x1)/(n-1);
  for(let i=0;i<n;i++) out.push(x1 + step*i);
  return out;
}

function fmtFixedExp(v){
  const s = Number(v).toExponential(6);
  const m = s.match(/^([+-]?\d\.\d+e)([+-])(\d+)$/);
  if(!m) return s;
  return m[1] + m[2] + m[3].padStart(2,"0");
}
function padRight(s, w){
  s = String(s);
  return s.length >= w ? s : s + " ".repeat(w - s.length);
}

function attachLiveCoordinates(plotId){
  const gd = document.getElementById(plotId);
  const coordX = document.getElementById("coordX");
  const coordY = document.getElementById("coordY");

  function clearBox(){
    coordX.textContent = "–";
    coordY.textContent = "–";
  }

  gd.addEventListener("mousemove", (ev) => {
    const fullLayout = gd._fullLayout;
    if(!fullLayout || !fullLayout.xaxis || !fullLayout.yaxis) return;

    const xa = fullLayout.xaxis;
    const ya = fullLayout.yaxis;

    const rect = gd.getBoundingClientRect();
    const px = ev.clientX - rect.left;
    const py = ev.clientY - rect.top;

    const x0 = xa._offset;
    const x1 = xa._offset + xa._length;
    const y0 = ya._offset;
    const y1 = ya._offset + ya._length;

    if(px < x0 || px > x1 || py < y0 || py > y1){
      clearBox();
      return;
    }

    const xVal = xa.p2l(px - xa._offset);
    const yVal = ya.p2l(py - ya._offset);

    coordX.textContent = Number(xVal).toPrecision(8);
    coordY.textContent = Number(yVal).toPrecision(8);
  });

  gd.addEventListener("mouseleave", clearBox);
}

async function plot(){
  try{
    const tx = document.getElementById("tx").value;
    const ty = document.getElementById("ty").value;
    const ref = Number(document.getElementById("ref").value);

    if(tx === ty){ alert("X and Y must be different"); return; }

    const dx = await loadTransition(tx);
    const dy = await loadTransition(ty);

    if(!dx.has(ref) || !dy.has(ref)){
      alert("REF="+ref+" not found in one of the transitions");
      return;
    }

    const nu_x_ref = dx.get(ref);
    const nu_y_ref = dy.get(ref);
    const mref = MASS[ref];

    const pts=[];
    for(const A of ISOTOPES){
      if(A===ref) continue;
      if(!dx.has(A) || !dy.has(A)) continue;

      const dnu_x = dx.get(A) - nu_x_ref;
      const dnu_y = dy.get(A) - nu_y_ref;

      const muA = mu(MASS[A], mref);
      pts.push({A, mIS_x: muA*dnu_x, mIS_y: muA*dnu_y});
    }

    if(pts.length < 2){ alert("Not enough points to fit."); return; }

    const x = pts.map(p=>p.mIS_x);
    const y = pts.map(p=>p.mIS_y);
    const {a,b,r2} = linearFit(x,y);

    const xmin = Math.min(...x), xmax = Math.max(...x);
    const xr = (xmax-xmin) || 1;
    const xx = linspace(xmin-0.05*xr, xmax+0.05*xr, 300);
    const yy = xx.map(t => a + b*t);

    const denom = Math.sqrt(b*b + 1);
    const dperp_arr = pts.map(p => Math.abs(b*p.mIS_x - p.mIS_y + a)/denom);

    await Plotly.newPlot("plot",[
      {
        x, y,
        mode:"markers+text",
        text: pts.map(p=>String(p.A)),
        textposition:"top right",
        type:"scatter",
        name:"Isotopes",
        customdata: dperp_arr,
        hovertemplate:
          "Isotope A=%{text}<br>" +
          "mIS_x=%{x:.6g}<br>" +
          "mIS_y=%{y:.6g}<br>" +
          "d⊥=%{customdata:.6g}" +
          "<extra>Isotope point</extra>"
      },
      {
        x:xx, y:yy,
        mode:"lines",
        type:"scatter",
        name:"Linear fit",
        hovertemplate:
          "mIS_y = a + b·mIS_x<br>" +
          "mIS_x=%{x:.6g}<br>" +
          "mIS_y=%{y:.6g}" +
          "<extra>Linear fit</extra>"
      }
    ],{
      title:`King Plot: ${ty} vs ${tx} (ref=${ref})`,
      xaxis:{title:`μΔν (${tx})`},
      yaxis:{title:`μΔν (${ty})`},
      margin:{l:70,r:20,t:60,b:60},
      hovermode:"closest"
    },{
      responsive:true,
      displayModeBar:true
    });

    attachLiveCoordinates("plot");

    document.getElementById("fit").innerHTML =
      `<b>Fit:</b> mIS<sub>${ty}</sub> = a + b·mIS<sub>${tx}</sub>`+
      ` &nbsp; | &nbsp; <b>a</b> = ${a.toPrecision(6)}`+
      ` &nbsp; <b>b</b> = ${b.toPrecision(6)}`+
      ` &nbsp; <b>R²</b> = ${r2.toPrecision(6)}`;

    const W_A = 6, W_X = 16, W_Y = 16, W_D = 16;
    let out =
      padRight("A", W_A) +
      padRight("mIS_x", W_X) +
      padRight("mIS_y", W_Y) +
      padRight("d_perp", W_D) + "\n";
    for(const p of pts){
      const d = Math.abs(b*p.mIS_x - p.mIS_y + a)/denom;
      out +=
        padRight(p.A, W_A) +
        padRight(fmtFixedExp(p.mIS_x), W_X) +
        padRight(fmtFixedExp(p.mIS_y), W_Y) +
        padRight(fmtFixedExp(d), W_D) + "\n";
    }
    document.getElementById("out").textContent = out;

    const zooms = document.getElementById("zooms");
    zooms.innerHTML = "";

    const y_min = Math.min(...y), y_max = Math.max(...y);
    const yspan = (y_max - y_min) || 1;
    const xspan = (xmax - xmin) || 1;
    const pad_frac = 0.06;
    const hx = pad_frac*xspan;
    const hy = pad_frac*yspan;

    for(const p of pts){
      const x0 = p.mIS_x, y0 = p.mIS_y;

      const box = document.createElement("div");
      box.className = "zoomBox";
      const inner = document.createElement("div");
      inner.className = "zoomInner";
      box.appendChild(inner);
      zooms.appendChild(box);

      const pr = projPoint(a,b,x0,y0);
      const d = dPerp(a,b,x0,y0);

      const zxx = linspace(x0-hx, x0+hx, 80);
      const zyy = zxx.map(t => a + b*t);

      Plotly.newPlot(inner,[
        {
          x:zxx, y:zyy, mode:"lines", type:"scatter", showlegend:false,
          hovertemplate:"mIS_x=%{x:.6g}<br>mIS_y=%{y:.6g}<extra>Linear fit</extra>"
        },
        {
          x:[x0], y:[y0], mode:"markers", type:"scatter", showlegend:false,
          text:[String(p.A)], customdata:[d],
          hovertemplate:
            "Isotope A=%{text}<br>" +
            "mIS_x=%{x:.6g}<br>" +
            "mIS_y=%{y:.6g}<br>" +
            "d⊥=%{customdata:.6g}" +
            "<extra>Isotope point</extra>"
        },
        {
          x:[x0, pr.x_proj], y:[y0, pr.y_proj], mode:"lines", type:"scatter", showlegend:false,
          hovertemplate:"projection<extra>Isotope point</extra>"
        }
      ],{
        title:`${p.A}–${ref}   d⊥=${d.toPrecision(4)}`,
        margin:{l:40,r:10,t:40,b:35},
        xaxis:{range:[x0-hx, x0+hx]},
        yaxis:{range:[y0-hy, y0+hy]},
        hovermode:"closest"
      },{
        displayModeBar:true,
        responsive:true
      });
    }

  }catch(err){
    alert(String(err));
    console.error(err);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("btn").addEventListener("click", plot);
  plot();
});
</script>
</body>
</html>
